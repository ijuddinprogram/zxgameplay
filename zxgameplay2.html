<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZXGameplay2 — Gaming</title>
  <style>
    :root { --bg: #0a0a0f; --card: #13131d; --red: #ff0040; --cyan: #00e5ff; --gold: #ffb800; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(ellipse at top, rgba(255,0,64,.14), transparent 50%),
                  radial-gradient(ellipse at bottom right, rgba(0,229,255,.09), transparent 50%), var(--bg);
      color: #f1f5f9; min-height: 100vh; display: grid; place-items: center; padding: 24px;
    }
    .card {
      background: rgba(19,19,29,.9); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 32px;
      padding: 48px 36px; text-align: center; max-width: 560px; width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,0,64,.12) inset;
    }
    .logo {
      width: 120px; height: 120px; border-radius: 50%;
      background: linear-gradient(145deg, var(--red), #6b00ff);
      margin: 0 auto 22px; display: grid; place-items: center;
      font-size: 56px; font-weight: 900; letter-spacing: -.03em;
      box-shadow: 0 0 50px rgba(255,0,64,.35), 0 0 0 6px rgba(255,255,255,.06);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 50px rgba(255,0,64,.35), 0 0 0 6px rgba(255,255,255,.06); }
      50% { box-shadow: 0 0 70px rgba(255,0,64,.6), 0 0 0 10px rgba(255,255,255,.12); }
    }
    h1 { font-size: 32px; font-weight: 900; letter-spacing: -.02em; }
    .tagline { color: #94a3b8; margin: 8px 0 32px; font-size: 15px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,184,0,.12); border: 1px solid rgba(255,184,0,.25);
      border-radius: 999px; padding: 6px 16px; font-size: 13px;
      color: var(--gold); margin-bottom: 28px; font-weight: 700;
    }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn {
      text-decoration: none; display: flex; align-items: center; gap: 10px;
      padding: 16px 28px; border-radius: 999px; font-weight: 800; font-size: 15px;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-3px); }
    .btn-yt {
      background: linear-gradient(135deg, #ff0033, #cc0022);
      color: white; box-shadow: 0 12px 30px rgba(255,0,0,.3);
    }
    .btn-yt:hover { box-shadow: 0 18px 40px rgba(255,0,0,.45); }
    .btn-tt {
      background: linear-gradient(135deg, #00f2ea, #ff0050);
      color: white; box-shadow: 0 12px 30px rgba(0,242,234,.22);
    }
    .btn-tt:hover { box-shadow: 0 18px 40px rgba(255,0,80,.35); }
    .btn svg { width: 22px; height: 22px; }

    .stats { display: flex; gap: 32px; justify-content: center; margin-top: 36px; padding-top: 28px; border-top: 1px solid rgba(255,255,255,.06); }
    .stat strong { display: block; font-size: 24px; color: var(--cyan); }
    .stat span { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .1em; }
    .footer { margin-top: 18px; font-size: 12px; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ZX</div>
    <h1>ZXGameplay2</h1>
    <p class="tagline">Gameplay, tips & tricks, mobile legends, dan konten gaming seru.</p>
    <div class="badge">🎮 Gaming Creator</div>
    <div class="links">
      <a class="btn btn-yt" href="https://youtube.com/@ZXGameplay2" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.5 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        YouTube
      </a>
      <a class="btn btn-tt" href="https://www.tiktok.com/@mcgogozshopapps" target="_blank" rel="noopener"ps>
        <svg viewBox="0 0 24 24" fill="white"><path d="M12.5 0h4.2v1.7a6.6 6.6 0 0 0 3.8 1.2v4.2c-2.1 0-4-.8-5.5-2v8.6a5.8 5.8 0 1 1-5.8-5.8v4.2c.9 0 1.7.7 1.7 1.7s-.8 1.7-1.7 1.7a1.7 1.7 0 0 1-1.7-1.7V10.5A5.8 5.8 0 0 0 17 15.2h4.2a9.9 9.9 0 0 1-8.7-4.7z"/></svg>
        TikTok
      </a>
    </div>
    <div class="stats">
      <div class="stat"><strong>84+</strong><span>Video</span></div>
      <div class="stat"><strong>138+</strong><span>Subscriber</span></div>
      <div class="stat"><strong>MLBB</strong><span>Game Favorit</span></div>
    </div>
    <p class="footer">Subscribe & follow untuk konten gaming terbaru setiap minggu!</p>
  </div>
</body>
</html>
